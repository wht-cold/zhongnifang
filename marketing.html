<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>AI营销助手 · 朋友圈文案配图</title>
<style>
:root{--gold:#D4A574;--gold2:#B8895A;--pink:#f5ede4;--bg:#fdf9f5;--card:#fff;--t:#3C2A1E;--t2:#8B7355;--t3:#B0A090}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;justify-content:center;line-height:1.5}
.app{width:100%;max-width:480px;min-height:100vh;padding:16px 16px 40px}
/* 顶栏 */
.header{text-align:center;padding:24px 0 16px}
.header .logo{font-size:44px;margin-bottom:8px}
.header h1{font-size:22px;color:var(--gold2);letter-spacing:1px}
.header .sub{font-size:13px;color:var(--t3);margin-top:4px}
/* 场景选择卡片 */
.scene-title{font-size:15px;font-weight:600;margin:16px 0 10px;color:var(--t2)}
.scenes{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scene{
  background:var(--card);border:2px solid transparent;border-radius:14px;padding:16px 12px;
  cursor:pointer;text-align:center;transition:.25s;box-shadow:0 2px 8px rgba(0,0,0,.04)
}
.scene:hover,.scene.sel{border-color:var(--gold);background:var(--pink)}
.scene .si{font-size:30px;display:block;margin-bottom:6px}
.scene .st{font-size:13px;font-weight:600}
.scene .sd{font-size:11px;color:var(--t3);margin-top:2px}
/* 输入区 */
.input-area{margin-top:16px}
.input-area textarea{
  width:100%;height:80px;padding:14px;border:1.5px solid #e8ddd2;border-radius:12px;
  font-size:15px;resize:none;outline:none;font-family:inherit;background:var(--card);
  line-height:1.6
}
.input-area textarea:focus{border-color:var(--gold)}
/* 大按钮 */
.big-btn{
  display:block;width:100%;padding:16px;border:none;border-radius:14px;
  font-size:17px;font-weight:600;cursor:pointer;text-align:center;
  transition:.25s;margin-top:12px
}
.btn-generate{background:linear-gradient(135deg,#D4A574,#C4946A);color:#fff;letter-spacing:2px}
.btn-generate:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,165,116,.35)}
.btn-generate:disabled{background:#ccc;transform:none;box-shadow:none}
.btn-copy{background:#fff;color:var(--gold);border:2px solid var(--gold)}
/* 结果区 */
.result{display:none;margin-top:20px}
.result .section-label{font-size:14px;font-weight:600;color:var(--gold2);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.copy-box{
  background:var(--card);border-radius:14px;padding:20px;position:relative;
  border:1px solid #eee;white-space:pre-wrap;font-size:15px;line-height:1.9;
  box-shadow:0 2px 8px rgba(0,0,0,.03)
}
.copy-box .emoji{font-size:20px}
.copy-btn{
  position:absolute;top:12px;right:12px;padding:8px 16px;background:var(--pink);
  border:none;border-radius:20px;font-size:13px;color:var(--gold2);
  cursor:pointer;font-weight:500
}
.copy-btn:active{background:#e8d5c4}
/* 上传区 */
.upload-area{margin-top:12px}
.upload-area input[type=file]{display:none}
.upload-btn{
  display:flex;align-items:center;gap:8px;padding:14px 18px;background:var(--card);
  border:2px dashed #e8ddd2;border-radius:12px;cursor:pointer;font-size:14px;
  color:var(--t2);transition:.25s;width:100%
}
.upload-btn:hover{border-color:var(--gold);background:#fff}
.upload-btn .uicon{font-size:22px}
.upload-preview{display:none;margin-top:8px;position:relative}
.upload-preview img{width:100%;border-radius:12px;max-height:300px;object-fit:cover}
.upload-preview .del-btn{
  position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.5);color:#fff;border:none;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center
}
/* 配图切换 */
.img-toggle{display:flex;gap:8px;margin-bottom:10px}
.img-toggle button{
  flex:1;padding:10px;border:2px solid #e8ddd2;border-radius:10px;
  background:#fff;cursor:pointer;font-size:13px;color:var(--t2);transition:.2s
}
.img-toggle button.active{border-color:var(--gold);background:var(--pink);color:var(--gold2)}
.img-box{
  background:var(--card);border-radius:14px;overflow:hidden;border:1px solid #eee;
  min-height:200px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.03)
}
.img-box img{width:100%;display:block}
.img-box .loading{text-align:center;color:var(--t3);padding:40px}
.img-box .loading .spinner{font-size:40px;animation:spin 1.5s linear infinite;display:block;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* 朋友圈卡片 - 完全仿真微信 */
.moments-card{
  background:#fff;border-radius:0;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);
  font-size:15px
}
.moments-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:#ededed;border-bottom:1px solid #d9d9d9;
  font-size:17px;font-weight:500;color:#000
}
.moments-back{color:#000;font-size:20px}
.moments-camera{font-size:20px}
.moments-feed{display:flex;padding:14px 12px;gap:10px}
.moments-avatar{
  width:42px;height:42px;border-radius:6px;background:#e8d5c4;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0
}
.moments-content{flex:1;min-width:0}
.moments-name{font-weight:700;color:#576b95;font-size:15px;margin-bottom:4px}
.moments-text{font-size:16px;line-height:1.7;color:#000;white-space:pre-wrap;margin-bottom:8px}
.moments-images{margin-bottom:6px}
.moments-images img{
  width:100%;max-width:260px;border-radius:4px;display:block;object-fit:cover;max-height:300px
}
.moments-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.moments-time{font-size:12px;color:#8c8c8c}
.moments-actions{display:flex;gap:12px}
.moments-action{font-size:12px;color:#8c8c8c;background:none;border:none;cursor:pointer;padding:4px 0}
.moments-likes{
  margin-top:6px;padding:4px 8px 4px 6px;background:#f7f7f7;
  font-size:13px;color:#576b95;display:flex;align-items:flex-start;gap:4px
}
.m-like-icon{color:#e04040;flex-shrink:0;margin-top:1px}
.moments-comments{margin-top:0;background:#f7f7f7;padding:0 8px 6px 8px}
.mcomment{font-size:13px;line-height:1.7;padding:2px 0;color:#222}
.mc-name{color:#576b95;font-weight:500}
.moments-divider{height:8px;background:#f0f0f0}
/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;padding:12px 24px;border-radius:10px;font-weight:500;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;background:#10b981;color:#fff}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="logo">🌸</div>
  <h1>AI 营销助手</h1>
  <div class="sub">一键生成朋友圈文案 & 配图</div>
</div>

<!-- 店铺名 -->
<div class="input-area" style="margin-top:0">
  <input id="shopName" placeholder="输入你的店铺名称" style="width:100%;padding:14px;border:1.5px solid #e8ddd2;border-radius:12px;font-size:15px;outline:none;background:var(--card)" value="">
</div>

<!-- 场景选择 -->
<div class="scene-title">📌 选择推销场景</div>
<div class="scenes" id="scenes">
  <div class="scene sel" onclick="pickScene(this,'new')"><span class="si">🆕</span><span class="st">新品上线</span><span class="sd">新项目/新产品</span></div>
  <div class="scene" onclick="pickScene(this,'sale')"><span class="si">🎉</span><span class="st">限时优惠</span><span class="sd">打折/活动/促销</span></div>
  <div class="scene" onclick="pickScene(this,'tips')"><span class="si">💡</span><span class="st">护肤小知识</span><span class="sd">专业科普吸引顾客</span></div>
  <div class="scene" onclick="pickScene(this,'review')"><span class="si">💬</span><span class="st">顾客好评</span><span class="sd">晒效果图/好评</span></div>
  <div class="scene" onclick="pickScene(this,'festival')"><span class="si">🎊</span><span class="st">节日营销</span><span class="sd">节日/节气借势</span></div>
  <div class="scene" onclick="pickScene(this,'daily')"><span class="si">📷</span><span class="st">日常营业</span><span class="sd">温馨日常互动</span></div>
</div>

<!-- 补充输入 -->
<div class="input-area">
  <textarea id="extraInput" placeholder="补充你想推销的产品/活动内容...&#10;比如：玻尿酸补水项目 198元体验价"></textarea>
</div>

<!-- 拍照/上传图片 -->
<div class="upload-area">
  <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto(event)">
  <label for="photoInput" class="upload-btn">
    <span class="uicon">📸</span> 拍照或上传产品图/店铺图<span style="font-size:11px;color:var(--t3);margin-left:auto;">选填</span>
  </label>
  <div class="upload-preview" id="photoPreview">
    <button class="del-btn" onclick="removePhoto()">✕</button>
    <img id="photoImg">
  </div>
</div>

<!-- 生成按钮 -->
<button class="big-btn btn-generate" id="genBtn" onclick="generate()">
  ✨ 一键生成文案+配图
</button>

<!-- 结果区 -->
<div class="result" id="result">
  <!-- ====== 仿微信朋友圈预览 ====== -->
  <div class="section-label">📱 朋友圈预览效果</div>
  <div class="moments-card">
    <!-- 顶栏 -->
    <div class="moments-topbar">
      <span class="moments-back">←</span>
      <span class="moments-title">朋友圈</span>
      <span class="moments-camera">📷</span>
    </div>
    <!-- 动态 -->
    <div class="moments-feed">
      <div class="moments-avatar" id="ma">🌸</div>
      <div class="moments-content">
        <div class="moments-name" id="mn">我的美容店</div>
        <div class="moments-text" id="mt"></div>
        <div class="moments-images" id="mi"></div>
        <div class="moments-meta">
          <span class="moments-time">刚刚</span>
          <span class="moments-actions">
            <span class="moments-action">💬 评论</span>
            <span class="moments-action">❤️</span>
          </span>
        </div>
        <!-- 点赞 -->
        <div class="moments-likes" id="mlikes">
          <span class="m-like-icon">❤️</span>
          <span id="mlikeNames">王姐, 刘阿姨, 美容顾问-小陈</span>
        </div>
        <!-- 评论 -->
        <div class="moments-comments" id="mcomments">
          <div class="mcomment"><span class="mc-name">王姐</span>：怎么预约呀？我想下午过来</div>
          <div class="mcomment"><span class="mc-name" id="mreplyName">我的美容店</span> 回复 <span class="mc-name">王姐</span>：姐，私信我帮你留位子~😊</div>
          <div class="mcomment"><span class="mc-name">刘阿姨</span>：上次做的补水效果特别好！</div>
          <div class="mcomment"><span class="mc-name">美容顾问-小陈</span>：新品真的不错👍</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 操作区 -->
  <div class="section-label" style="margin-top:20px;">📋 操作</div>
  <div class="copy-box" id="textResult">
    <button class="copy-btn" onclick="copyText()">📋 复制文案</button>
  </div>
  <div class="img-box" id="imgResult"></div>
</div>

  <!-- 文案 -->
  <div class="section-label">📝 文案（点右上角复制）</div>
  <div class="copy-box" id="textResult">
    <button class="copy-btn" onclick="copyText()">📋 复制文案</button>
  </div>

  <!-- 配图 -->
  <div class="section-label">🎨 AI配图</div>
  <div class="img-box" id="imgResult">
    <div class="loading"><span class="spinner">🎨</span>AI正在生成配图...</div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
var currentScene = 'new';
var uploadedPhoto = null;
var sceneNames = {new:'新品上线',sale:'限时优惠',tips:'护肤知识',review:'顾客好评',festival:'节日营销',daily:'日常营业'};

function handlePhoto(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    uploadedPhoto = ev.target.result;
    document.getElementById('photoImg').src = uploadedPhoto;
    document.getElementById('photoPreview').style.display = 'block';
    document.querySelector('.upload-btn').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function removePhoto(){
  uploadedPhoto = null;
  document.getElementById('photoInput').value = '';
  document.getElementById('photoPreview').style.display = 'none';
  document.querySelector('.upload-btn').style.display = 'flex';
}

function pickScene(el, scene){
  currentScene = scene;
  document.querySelectorAll('.scene').forEach(function(s){s.classList.remove('sel')});
  el.classList.add('sel');
}

// AI文案生成器 — 模板+智能组合
function updateFakeComments(scene, shop){
  var likes = {new:['王姐','刘阿姨','美容师-小陈'],sale:['李阿姨','张姐','赵姐','钱姐'],tips:['王姐','美容达人-丽丽'],review:['刘阿姨','张姐','周姐','王姐'],festival:['李姐','赵阿姨','钱姐','孙姐','王姐'],daily:['王姐','刘阿姨']};
  var comments = {
    new: [{n:'王姐',t:'这个新项目看起来不错！怎么预约？'},{n:'刘阿姨',t:'多少钱呀？我想试试'},{n:'美容师-小陈',t:'这个真的很好，我试用过了👍'}],
    sale: [{n:'李阿姨',t:'给我留一个名额！下午过来'},{n:'张姐',t:'活动到什么时候？'},{n:'赵姐',t:'太划算了，我明天带朋友来'}],
    tips: [{n:'王姐',t:'学到了！怪不得我皮肤最近干'},{n:'美容达人-丽丽',t:'老师说得对，补水真的很重要'}],
    review: [{n:'刘阿姨',t:'我也是在这做的！效果确实好'},{n:'张姐',t:'下次给我也安排上'},{n:'周姐',t:'周末还有位置吗？'}],
    festival: [{n:'李姐',t:'节日快乐！明天过来做个护理'},{n:'赵阿姨',t:'有没有节日优惠？'}],
    daily: [{n:'王姐',t:'今天下午还有位子吗？'}]
  };
  var lks = likes[scene]||likes.daily;
  var cms = comments[scene]||comments.daily;
  document.getElementById('mlikeNames').textContent = lks.join(', ');
  var h = '';
  cms.forEach(function(c,i){
    h += '<div class="mcomment"><span class="mc-name">'+c.n+'</span>：'+c.t+'</div>';
    if(i===0){h += '<div class="mcomment"><span class="mc-name">'+shop+'</span> 回复 <span class="mc-name">'+c.n+'</span>：私信我帮您预留哦~😊</div>';}
  });
  document.getElementById('mcomments').innerHTML = h;
}

    daily: [
      '☀️早安 | 元气满满的一天\n\n'+(extra||'今天阳光很好，店里的花也开了')+'\n新的一天，从爱自己开始💕\n\n📍'+shop+'\n💆‍♀️ 今天有位子，约吗？',
      '🌙晚安 | 睡前分享\n\n'+(extra||'忙碌的一天结束了，敷个面膜犒劳自己')+'\n\n女人，一定要对自己好一点💕\n\n📍'+shop+'\n晚安，明天见～',
      '📷 今日店内日常\n\n'+(extra||'打扫完毕，泡好花茶，等姐妹们来')+'\n用心准备，只为你来的时候舒服放松🌸\n\n📍'+shop+'\n💬 今天下午还有空位哦',
    ]
  };
  var pool = templates[scene] || templates.daily;
  return pool[Math.floor(Math.random() * pool.length)];
}

// AI配图异步加载 — 不阻塞，加载完成自动显示
function loadAIImage(scene, extra, callback){
  var prompts = {
    new: 'elegant beauty skincare products, soft pink gold, clean minimal, professional beauty salon, product photography',
    sale: 'luxury spa promotion sale, warm golden lighting, inviting beauty treatment, elegant, high quality',
    tips: 'natural skincare fresh ingredients, rose petals aloe, clean white background, spa, healthy glowing skin',
    review: 'happy woman glowing beautiful skin after facial treatment, warm smile, professional beauty salon',
    festival: 'festive celebration beauty spa, elegant flowers decorations, warm inviting, golden, celebration mood',
    daily: 'warm cozy beauty salon interior, fresh flowers tea set, morning sunlight, clean elegant, welcoming'
  };
  var prompt = (prompts[scene]||prompts.daily) + (extra?', '+extra:'');
  var url = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) + '?width=400&height=400&nologo=true&seed=' + Date.now();
  var img = new Image();
  img.onload = function(){ callback(url); };
  img.onerror = function(){
    // 降级：渐变图片
    var colors = {new:'fce4ec,f8bbd0',sale:'fff3e0,ffe0b2',tips:'e8f5e9,c8e6c9',review:'f3e5f5,e1bee7',festival:'fff8e1,ffecb3',daily:'f5f0e8,e8d5c4'};
    var c = (colors[scene]||colors.daily).split(',');
    var fallback = 'data:image/svg+xml,'+encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#'+c[0]+'"/><stop offset="100%" style="stop-color:#'+c[1]+'"/></linearGradient></defs><rect fill="url(#g)" width="400" height="400"/><text x="200" y="180" text-anchor="middle" font-size="100">🌸</text><text x="200" y="260" text-anchor="middle" font-size="22" fill="#666">'+sceneNames[scene]+'</text></svg>');
    callback(fallback);
  };
  img.src = url;
}

function generateTemplateImg(scene){
  var colors = {new:'fce4ec,f8bbd0',sale:'fff3e0,ffe0b2',tips:'e8f5e9,c8e6c9',review:'f3e5f5,e1bee7',festival:'fff8e1,ffecb3',daily:'f5f0e8,e8d5c4'};
  var c = (colors[scene]||colors.daily).split(',');
  return 'data:image/svg+xml,'+encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#'+c[0]+'"/><stop offset="100%" style="stop-color:#'+c[1]+'"/></linearGradient></defs><rect fill="url(#g)" width="400" height="400"/><text x="200" y="180" text-anchor="middle" font-size="100">🌸</text><text x="200" y="260" text-anchor="middle" font-size="22" fill="#666">'+sceneNames[scene]+'</text></svg>');
}

function generate(){
  var btn = document.getElementById('genBtn');
  var extra = document.getElementById('extraInput').value.trim();
  var shopName = document.getElementById('shopName').value.trim() || '我的美容店';
  document.getElementById('mn').textContent = shopName;
  document.getElementById('ma').textContent = shopName[0] || '🌸';
  btn.disabled = true;
  btn.textContent = '⏳ 正在生成...';
  document.getElementById('result').style.display = 'block';
  document.getElementById('imgResult').innerHTML = '<div class="loading"><span class="spinner">🎨</span>AI正在生成配图...</div>';
  document.getElementById('mi').innerHTML = '<div style="padding:16px;text-align:center;color:#999;font-size:13px;">🎨 AI配图生成中...</div>';

  // 生成文案
  var copy = generateCopy(currentScene, extra);
  document.getElementById('textResult').innerHTML = '<button class="copy-btn" onclick="copyText()">📋 复制文案</button>' + copy.replace(/\n/g,'<br>');
  document.getElementById('mt').innerHTML = copy.replace(/\n/g,'<br>');
  // 更新评论回复里的店名
  document.getElementById('mreplyName').textContent = shopName;
  // 根据场景更新评论
  updateFakeComments(currentScene, shopName);

  // 配图：有照片秒出照片，没照片秒出模板
  if (uploadedPhoto) {
    document.getElementById('imgResult').innerHTML = '<div style="font-size:12px;color:var(--t3);padding:8px;text-align:center;">📸 商家实拍</div><img src="'+uploadedPhoto+'" alt="实拍">';
    document.getElementById('mi').innerHTML = '<img src="'+uploadedPhoto+'" alt="实拍">';
  } else {
    var tplUrl = generateTemplateImg(currentScene);
    document.getElementById('imgResult').innerHTML = '<div style="font-size:12px;color:var(--t3);padding:8px;text-align:center;">🎨 点击上方拍照按钮替换实拍图</div><img src="'+tplUrl+'" alt="配图">';
    document.getElementById('mi').innerHTML = '<img src="'+tplUrl+'" alt="配图">';
  }

  btn.disabled = false;
  btn.textContent = '✨ 一键生成文案+配图';
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
}

function copyText(){
  var text = document.getElementById('textResult').innerText.replace('📋 复制文案\n','').replace(/复制文案\n?/,'');
  navigator.clipboard.writeText(text).then(function(){
    showToast('✅ 文案已复制！去朋友圈粘贴吧');
  }).catch(function(){
    showToast('请长按文案手动复制');
  });
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2000);
}
</script>
